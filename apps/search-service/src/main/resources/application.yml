server:
  port: ${PORT:8084}
spring:
  application:
    name: search-service
management:
  endpoints:
    web:
      exposure:
        include: health,info
peuin:
  supabase:
    url: ${SUPABASE_URL}
    anon-key: ${SUPABASE_ANON_KEY}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_ANON_KEY}}
  goong:
    place-api-key: ${GOONG_PLACE_API_KEY:${GOONG_API_KEY:}}
  vietmap:
    api-key: ${VIETMAP_API_KEY:${VIETMAP_PLACE_API_KEY:}}
  upstash:
    redis-url: ${UPSTASH_REDIS_REST_URL:}
    redis-token: ${UPSTASH_REDIS_REST_TOKEN:}
