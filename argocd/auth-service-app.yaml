apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Peuin/mcrservice.git
    targetRevision: main
    path: apps/auth-service/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mcrservice
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
