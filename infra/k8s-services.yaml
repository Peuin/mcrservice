apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcrservice
  namespace: peuin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcrservice
  template:
    metadata:
      labels:
        app: mcrservice
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mcrservice
          image: ghcr.io/peuin/mcrservice:20260619-1647-audit-amd64
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: peuin-config
            - secretRef:
                name: peuin-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcrservice
  namespace: peuin
spec:
  selector:
    app: mcrservice
  ports:
    - name: http
      port: 80
      targetPort: http
