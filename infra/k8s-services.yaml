apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: peuin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: auth-service
          image: ghcr.io/nquynh2011199/auth-service:0.1.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: peuin-config
            - secretRef:
                name: peuin-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: peuin
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8081
---
